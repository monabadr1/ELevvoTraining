<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="weatherdashboard.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <h1>Weather</h1>
      <span class="sub">Minimal multi-city dashboard</span>
    </div>
    <form id="searchForm" class="search" autocomplete="off">
      <input id="searchInput" type="text" placeholder="Search city (e.g. Cairo)..." />
      <button type="submit">Add</button>
    </form>
  </header>

  <main class="container">
    <section class="toolbar">
      <div class="chips" id="chips"></div>
      <button id="refreshBtn" class="ghost">Refresh</button>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="weatherdashboard.js"></script>
</body>

</html>
